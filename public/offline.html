<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | FlexSell Wholesale</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0F172A;
      color: #F8FAFC;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #3B82F6, #8B5CF6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: #94A3B8;
      max-width: 400px;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    .btn {
      background-color: #F8FAFC;
      color: #0F172A;
      border: none;
      padding: 12px 24px;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: background-color 0.2s;
    }
    .btn:hover {
      background-color: #E2E8F0;
    }
  </style>
</head>
<body>
  <h1>You are Offline</h1>
  <p>Your network connection was lost. FlexSell Wholesale catalog cache will serve offline pages while you are disconnected.</p>
  <button class="btn" onclick="window.location.reload()">Retry Connection</button>
</body>
</html>
